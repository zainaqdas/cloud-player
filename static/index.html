<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Player Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 12px; width: 100%; max-width: 700px; text-align: center; }
        input { width: 90%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 20px; }
        button { background: #10b981; color: #064e3b; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #475569; }
        video { width: 100%; margin-top: 20px; background: black; border-radius: 8px; }
        #status { margin-top: 15px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cloud Streamer</h1>
        <input type="text" id="url" placeholder="Paste link here...">
        <br>
        <button id="playBtn">Start Stream</button>
        <div id="status">Ready</div>
        <video id="video" controls playsinline></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const playBtn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        let hls = null;

        playBtn.onclick = async () => {
            const url = document.getElementById('url').value.trim();
            if (!url) return;

            if (hls) hls.destroy();
            playBtn.disabled = true;
            status.innerText = "Transcoding for compatibility... (takes ~15 seconds)";

            try {
                const res = await fetch('/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                
                if (data.url) {
                    status.innerText = "Streaming Live!";
                    startHls(data.url);
                } else {
                    throw new Error(data.detail);
                }
            } catch (e) {
                status.innerText = "Error: " + e.message;
                playBtn.disabled = false;
            }
        };

        function startHls(streamUrl) {
            const finalUrl = streamUrl + "?t=" + Date.now();
            if (Hls.isSupported()) {
                hls = new Hls({
                    // Faster loading settings
                    manifestLoadingTimeOut: 30000,
                    enableWorker: true,
                    startLevel: 0,
                    debug: false
                });
                hls.loadSource(finalUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    playBtn.disabled = false;
                });
                hls.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) hls.recoverMediaError();
                });
            } else {
                video.src = finalUrl;
                video.play();
                playBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
