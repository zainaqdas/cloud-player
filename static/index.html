<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Player Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0f172a; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: #1e293b; padding: 30px; border-radius: 12px; width: 100%; max-width: 800px; text-align: center; border: 1px solid #334155; }
        input { width: 90%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 20px; outline: none; }
        button { background: #10b981; color: #064e3b; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #475569; cursor: wait; }
        video { width: 100%; aspect-ratio: 16/9; margin-top: 20px; background: #000; border-radius: 8px; }
        #status { margin-top: 15px; color: #94a3b8; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cloud Streamer</h1>
        <input type="text" id="url" placeholder="Paste Video Link...">
        <br>
        <button id="playBtn">Start Stream</button>
        <div id="status">Ready</div>
        <video id="video" controls playsinline></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const playBtn = document.getElementById('playBtn');
        const status = document.getElementById('status');
        let hls = null;

        playBtn.onclick = async () => {
            const url = document.getElementById('url').value.trim();
            if (!url) return;

            if (hls) hls.destroy();
            playBtn.disabled = true;
            status.innerText = "Initializing... Large videos may take 20s.";

            try {
                const res = await fetch('/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                
                if (data.url) {
                    status.innerText = "Stream Found! Buffering...";
                    startHls(data.url);
                } else {
                    throw new Error(data.detail);
                }
            } catch (e) {
                status.innerText = "Error: " + e.message;
                playBtn.disabled = false;
            }
        };

        function startHls(streamUrl) {
            // CACHE BUSTER: Adds a unique timestamp to the manifest URL
            const finalUrl = streamUrl + "?t=" + Date.now();

            if (Hls.isSupported()) {
                hls = new Hls({
                    manifestLoadingTimeOut: 30000,
                    fragLoadingTimeOut: 30000,
                    enableWorker: true
                });
                hls.loadSource(finalUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    status.innerText = "Streaming Live!";
                    video.play();
                    playBtn.disabled = false;
                });
                hls.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) hls.recoverMediaError();
                });
            } else {
                // Safari Fallback
                video.src = finalUrl;
                video.play();
                playBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
